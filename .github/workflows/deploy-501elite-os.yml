name: Deploy 501 Elite OS

on:
  push:
    branches:
      - main
    paths:
      - "portal/**"
      - ".github/workflows/deploy-501elite-os.yml"
  workflow_dispatch:

concurrency:
  group: 501elite-os-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate-and-deploy:
    name: Validate and deploy production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: portal
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
      VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: portal/package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Configure server-only Supabase credential
        run: printf '%s' "$SUPABASE_SECRET_KEY" | npx wrangler secret put SUPABASE_SECRET_KEY

      - name: Configure push notification credential
        if: env.VAPID_PRIVATE_KEY != ''
        run: printf '%s' "$VAPID_PRIVATE_KEY" | npx wrangler secret put VAPID_PRIVATE_KEY

      - name: Build and deploy Worker
        run: npm run deploy
